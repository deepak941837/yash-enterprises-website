<!-- ================= CHATBOT ================= -->
<div class="chatbot-container">

    <div class="chatbot-header">
    <div class="chat-header-left">
        <img src="/images/chatbot.png" alt="bot" class="chat-avatar">
        <span>Yash Assistant</span>
    </div>
    <button id="chat-close">✖</button>
</div>
<div class="bot-msg">
    <img src="/assets/images/chatbot.jpg" class="msg-avatar">
    Hi 👋
</div>
    <!-- BODY -->
    <div class="chatbot-body" id="chat-body">

        <div class="bot-msg">
            Hi 👋 How can I help you?
        </div>

        <!-- QUICK LINKS -->
        <div class="quick-links">
            <a href="/pages/explore-services.html">💼 Services</a>
            <a href="/pages/sales.html">🛒 Products</a>
            <a href="/pages/contact.html">📞 Contact</a>
            <a href="/index.html#about">
  <i class="fa-solid fa-circle-info"></i> About Us
</a>
        </div>

    </div>

    <!-- INPUT -->
    <div class="chatbot-footer">
        <input type="text" id="chat-input" placeholder="Type a message...">
        <button id="chat-send">Send</button>
    </div>

</div>

<!-- FLOAT BUTTON -->
<button id="chat-toggle" class="chat-toggle">
    <i class="fa-solid fa-robot"></i>
</button>
