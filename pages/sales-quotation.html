<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Quotation | Yash Enterprises</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/sales-quotation.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div id="navbar"></div>

<section class="container">

  <h1 id="pageTitle">Get Product Quote</h1>
  <p class="subtitle">Select product details to get best price</p>

  <div class="form-layout">

    <!-- LEFT (PRODUCT FORM) -->
    <div class="form-box">
      <div id="dynamicForm"></div>
    </div>

    <!-- RIGHT (COMMON) -->
    <div class="form-box">

      <div class="form-group">
        <label>Requirement Details</label>
        <textarea name="requirement"></textarea>
      </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name">
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone">
      </div>

      <button type="button" id="whatsappBtn">
        Get Quote on WhatsApp
      </button>

    </div>

  </div>

</section>

<div id="footer"></div>

<script src="../js/main.js"></script>
<script src="../js/sales-quotation.js"></script>

</body>
</html>
