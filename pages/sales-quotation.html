<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Quotation | Yash Enterprises</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/sales-quotation.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div id="navbar"></div>

<section class="container">

  <h1 id="pageTitle">Get Product Quote</h1>
  <p class="subtitle">Select product details to get best price</p>

  <div class="form-layout">

    <!-- LEFT -->
    <div class="form-box">
      <div id="dynamicForm"></div>
    </div>

    <!-- RIGHT -->
    <div class="form-box">

      <div class="form-group">
        <label>Requirement Details</label>
        <textarea name="requirement"></textarea>
      </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="Enter Email" required>
      </div>

      <!-- BUTTON GROUP -->
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button id="emailBtn" class="email-btn">📧 Send Email</button>
        <button type="button" id="whatsappBtn">WhatsApp</button>
      </div>

    </div>

  </div>

</section>

<div id="floating"></div>
<div id="footer"></div>

<!-- ✅ EMAILJS SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
  emailjs.init("KUtCndDkQSAFFal5w");
</script>

<script src="../js/main.js"></script>
<script type="module" src="../js/firebase.js"></script>
<script src="../js/sales-quotation.js"></script>

</body>
</html>
