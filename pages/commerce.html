<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commerce | Yash Enterprises</title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- PAGE SPECIFIC CSS -->
    <link rel="stylesheet" href="../css/commerce.css">
    <link rel="stylesheet" href="../css/chatbot.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
<div class="page-transition"></div>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- HERO -->
    <section class="commerce-hero">
        <div class="container">
            <h1>Commerce Solutions</h1>
            <p>Driving business growth through reliable services and scalable sales solutions.</p>
        </div>
    </section>

    <!-- MAIN SECTION -->
    <section class="commerce-section">

        <div class="container commerce-grid">

 <a href="/pages/explore-services.html" class="card-link">
    <div class="commerce-card highlight fade-in">
        <i class="fa-solid fa-screwdriver-wrench"></i>
        <h2>Services</h2>
        <p>Our primary focus is delivering high-quality IT and technical services...</p>
        <span class="btn btn-outline">Explore Services</span>
    </div>
</a>

<a href="/pages/sales.html" class="card-link">
    <div class="commerce-card fade-in">
        <i class="fa-solid fa-cart-shopping"></i>
        <h2>Sales</h2>
        <p>We provide essential products and solutions...</p>
        <span class="btn btn-primary">View Products</span>
    </div>
</a>
        </div>

    </section>
    
<div id="chatbot"></div>

    <!-- Floating Contact -->
    <div id="floating"></div>

    <!-- Footer -->
    <div id="footer"></div>

 <script src="../js/main.js"></script>
<script type="module" src="../js/firebase.js"></script>

</body>
</html>
