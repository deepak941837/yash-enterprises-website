<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yash Enterprises</title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- PAGE CSS -->
    <link rel="stylesheet" href="../css/contact.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- HERO -->
    <section class="contact-hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We are here to help you. Reach out anytime.</p>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-section">
        <div class="container contact-grid">

            <!-- CONTACT INFO -->
            <div class="contact-info">
                <h2>Get in Touch</h2>

                <p><i class="fa-solid fa-phone"></i> +91 9308907319</p>
                <p><i class="fa-solid fa-envelope"></i> yashenterprises57575@gmail.com</p>
                <p><i class="fa-solid fa-location-dot"></i> Your Business Location</p>

            </div>

    <form id="contactForm" class="form">

    <input type="text" id="name" placeholder="Your Name" required class="form-input">

    <input type="email" id="email" placeholder="Your Email" required class="form-input">

    <input type="text" id="phone" placeholder="Your Phone" class="form-input">

    <textarea id="message" rows="5" placeholder="Your Message" required class="form-input"></textarea>

    <button type="submit" class="btn">Send Message</button>

</form>
            </div>

        </div>
    </section>

    <!-- Floating Contact -->
    <div id="floating"></div>

    <!-- Footer -->
    <div id="footer"></div>

<script src="../js/main.js"></script>
<script type="module" src="../js/firebase.js"></script>

<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const message = document.getElementById("message").value;

  fetch("https://yash-backend.onrender.com/contact", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, phone, message })
  });

  alert("Message sent successfully ✅");
});
</script>

</body>
</html>
