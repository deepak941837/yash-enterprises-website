<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Yash Enterprises</title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- PAGE CSS -->
    <link rel="stylesheet" href="../css/contact.css">

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- HERO -->
    <section class="contact-hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We are here to help you. Reach out anytime.</p>
        </div>
    </section>

    <!-- CONTACT SECTION -->
    <section class="contact-section">
        <div class="container contact-grid">

            <!-- CONTACT INFO -->
            <div class="contact-info">
                <h2>Get in Touch</h2>

                <p><i class="fa-solid fa-phone"></i> +91 9308907319</p>
                <p><i class="fa-solid fa-envelope"></i> yashenterprises57575@gmail.com</p>
                <p><i class="fa-solid fa-location-dot"></i> Your Business Location</p>

            </div>

            <!-- CONTACT FORM -->
            <div class="contact-form">
                <h2>Send Message</h2>

                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea rows="5" placeholder="Your Message" required></textarea>

                    <button type="submit">Send Message</button>
                </form>

            </div>

        </div>
    </section>

    <!-- Floating Contact -->
    <div id="floating"></div>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="../js/main.js"></script>

</body>
</html>
